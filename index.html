<textarea id="input" placeholder="try: Cider Chyper is so cool XD !!"></textarea>

<h3>Output</h3>
<div class="output" id="output"></div><script>
  const map = {
    a:'e', e:'a',
    b:'d', d:'b',
    c:'o', o:'c',
    f:'t', t:'f',
    g:'s', s:'g',
    h:'n', n:'h',
    i:'j', j:'i',
    k:'y', y:'k',
    l:'x', x:'l',
    m:'w', w:'m',
    p:'q', q:'p',
    r:'z', z:'r',
    u:'v', v:'u'
  };

  function transformText(text) {
    let output = "";
    for (let char of text) {
      output += map[char] || char;
    }
    return output;
  }

  const input = document.getElementById("input");
  const output = document.getElementById("output");

  function update() {
    output.innerText = transformText(input.value);
  }

  // 🔥 transforma enquanto escreves
  input.addEventListener("input", update);

  // 🔥 Enter também força atualização (caso queiras “sentir app”)
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      setTimeout(update, 0);
    }
  });

  // inicial
  update();
</script>
