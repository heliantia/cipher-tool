<!DOCTYPE html>
<html lang="en">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<head>
  <meta charset="UTF-8" />
  <title>Cider Cipher</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
    }

    .output {
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 10px;
      min-height: 120px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<textarea id="input" placeholder="try: Cider Cipher is so cool XD !!"></textarea>

<h3>Output</h3>
<div class="output" id="output"></div>

<script>
  const map = {
    a:'e', e:'a',
    b:'d', d:'b',
    c:'o', o:'c',
    f:'t', t:'f',
    g:'s', s:'g',
    h:'n', n:'h',
    i:'j', j:'i',
    k:'y', y:'k',
    l:'x', x:'l',
    m:'w', w:'m',
    p:'q', q:'p',
    r:'z', z:'r',
    u:'v', v:'u'
  };

  function transformText(text) {
    let output = "";
    for (let char of text) {
      output += map[char] || char;
    }
    return output;
  }

  const input = document.getElementById("input");
  const output = document.getElementById("output");

  function update() {
    output.innerText = transformText(input.value);
  }

  input.addEventListener("input", update);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      setTimeout(update, 0);
    }
  });

  update();
</script>

</body>
</html>
