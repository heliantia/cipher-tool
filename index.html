<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Cider Cipher</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
      padding: 10px;
    }

    .output {
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 10px;
      min-height: 120px;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      margin-bottom: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button id="installBtn" style="display:none;">
  Install App
</button>

<textarea id="input" placeholder="try: 91"></textarea>

<h3>Output</h3>
<div class="output" id="output"></div>

<script>
  // 🔐 CIPHER MAP (letters + numbers)
  const map = {
    a:'e', e:'a',
    b:'d', d:'b',
    c:'o', o:'c',
    f:'t', t:'f',
    g:'s', s:'g',
    h:'n', n:'h',
    i:'j', j:'i',
    k:'y', y:'k',
    l:'x', x:'l',
    m:'w', w:'m',
    p:'q', q:'p',
    r:'z', z:'r',
    u:'v', v:'u',

    1:'7', 7:'1',
    2:'4', 4:'2',
    3:'5', 5:'3',
    6:'9', 9:'6',
    0:'8', 8:'0'
  };

  function transformText(text) {
    let output = "";
    for (let char of text) {
      output += map[char] || char;
    }
    return output;
  }

  const input = document.getElementById("input");
  const output = document.getElementById("output");

  function update() {
    output.innerText = transformText(input.value);
  }

  input.addEventListener("input", update);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      setTimeout(update, 0);
    }
  });

  update();

  // 📲 PWA install button
  let deferredPrompt;
  const installBtn = document.getElementById("installBtn");

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = "block";
  });

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;

    deferredPrompt = null;
    installBtn.style.display = "none";
  });

  // 🔧 Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
